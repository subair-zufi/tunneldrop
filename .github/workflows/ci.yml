name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
  # Manual release: lets us cut a release without pushing a tag (the action
  # creates the tag server-side at the built commit). Run from the main branch.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create (e.g. v1.0.1)"
        required: true
        type: string

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (Linux only — logic is platform-neutral) ─────────────────────
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Key includes the repo name so the cache (which bakes absolute build
          # paths into src-tauri/target) is invalidated if the repo is renamed.
          key: ${{ runner.os }}-cargo-v2-${{ github.event.repository.name }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v2-${{ github.event.repository.name }}-

      - name: Fetch cloudflared sidecar (needed for build)
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  # ── Release gate ─────────────────────────────────────────────────────────────
  # Decides whether this run should publish a release and what tag to use.
  # - version tag push  → release that tag
  # - manual dispatch   → release the provided tag
  # - push to main      → release "v<app version>" only if no such release exists
  #                       yet (so a version bump in tauri.conf.json ships itself).
  gate:
    name: Release gate
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
            SHOULD=true
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            SHOULD=true
          else
            VER=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')
            TAG="v$VER"
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              SHOULD=false   # already released this version
            else
              SHOULD=true
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD" >> "$GITHUB_OUTPUT"
          echo "Release gate → tag=$TAG should_release=$SHOULD"

  # ── Release builds ───────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: test
    # Build on main pushes (keep main releasable), on version tags (so the
    # release job has artifacts), and on a manual release dispatch. Skipped for
    # feature branches and PRs.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            cf_dest: src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu
            cf_tarball: false
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*
              src-tauri/target/release/bundle/deb/*
            artifact_name: Tunneldrop-linux-x86_64

          - platform: macos-arm
            os: macos-14
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz
            cf_dest: src-tauri/binaries/cloudflared-aarch64-apple-darwin
            cf_tarball: true
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            artifact_name: Tunneldrop-macos-arm64

          - platform: windows
            os: windows-latest
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
            cf_dest: src-tauri/binaries/cloudflared-x86_64-pc-windows-msvc.exe
            cf_tarball: false
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.msi.sig
            artifact_name: Tunneldrop-windows-x86_64

          - platform: linux-arm64
            os: ubuntu-24.04-arm
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
            cf_dest: src-tauri/binaries/cloudflared-aarch64-unknown-linux-gnu
            cf_tarball: false
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*
              src-tauri/target/release/bundle/deb/*
            artifact_name: Tunneldrop-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Key includes the repo name so the cache (which bakes absolute build
          # paths into src-tauri/target) is invalidated if the repo is renamed.
          key: ${{ runner.os }}-cargo-release-v2-${{ github.event.repository.name }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-v2-${{ github.event.repository.name }}-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Fetch cloudflared sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.cf_tarball }}" == "true" ]]; then
            curl -fsSL "${{ matrix.cf_url }}" | tar -xz -O cloudflared > "${{ matrix.cf_dest }}"
          else
            curl -fsSL "${{ matrix.cf_url }}" -o "${{ matrix.cf_dest }}"
          fi
          chmod +x "${{ matrix.cf_dest }}" || true   # chmod is a no-op on Windows

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm /tmp/cert.p12

      - name: Build release bundle
        working-directory: src-tauri
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Required because tauri.conf.json sets bundle.createUpdaterArtifacts.
          # The build signs each updater bundle with this key and emits a .sig
          # alongside it; the matching public key is baked into the app via
          # plugins.updater.pubkey. TAURI_SIGNING_PRIVATE_KEY must be set. The
          # password var must always be present (even empty): the key here was
          # generated without one, so the absent secret resolves to "" — exactly
          # what an unprotected key expects.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ── GitHub Release (version tags, manual dispatch, or version bump on main) ──
  release:
    name: Publish GitHub Release
    needs: [gate, build]
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    # The release action creates this tag server-side at the built commit if it
    # doesn't exist yet (used for the version-bump and dispatch paths).
    env:
      RELEASE_TAG: ${{ needs.gate.outputs.tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into release directory
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.app.tar.gz" \
            -o -name "*.sig" \
          \) -exec cp {} release/ \;
          ls -lh release/

      # Build the static updater manifest the app polls. No server/DB: it points
      # at fixed release-asset URLs and embeds each bundle's signature (the .sig
      # file's contents). GitHub's /releases/latest/download/latest.json always
      # serves this from the newest release, which is the updater endpoint.
      - name: Generate updater manifest (latest.json)
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          cd release

          platforms='{}'
          add() {
            # $1 = updater target key, $2 = bundle filename, $3 = sig filename
            if [[ -f "$2" && -f "$3" ]]; then
              platforms=$(jq -n \
                --argjson p "$platforms" \
                --arg k "$1" \
                --arg url "$BASE/$2" \
                --arg sig "$(cat "$3")" \
                '$p + {($k): {signature: $sig, url: $url}}')
              echo "  + $1 -> $2"
            else
              echo "  - $1 skipped (missing bundle or signature)"
            fi
          }

          add darwin-aarch64 "$(ls *.app.tar.gz 2>/dev/null | head -1)"        "$(ls *.app.tar.gz.sig 2>/dev/null | head -1)"
          add linux-x86_64   "$(ls *_amd64.AppImage 2>/dev/null | head -1)"    "$(ls *_amd64.AppImage.sig 2>/dev/null | head -1)"
          add linux-aarch64  "$(ls *_aarch64.AppImage 2>/dev/null | head -1)"  "$(ls *_aarch64.AppImage.sig 2>/dev/null | head -1)"
          add windows-x86_64 "$(ls *.msi 2>/dev/null | head -1)"               "$(ls *.msi.sig 2>/dev/null | head -1)"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Tunneldrop $TAG" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $date, platforms: $platforms}' \
            > latest.json

          echo "── latest.json ──"
          cat latest.json
          # The raw .sig files don't need to be release assets once embedded.
          rm -f *.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Tunneldrop ${{ env.RELEASE_TAG }}
          body: |
            ## Tunneldrop ${{ env.RELEASE_TAG }}

            Signed builds for all platforms. Download the file for your OS:

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `*.dmg` — signed, opens without Gatekeeper warning |
            | Linux x86-64 | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
            | Linux ARM64 (Raspberry Pi 3/4/5) | `.AppImage` (portable) or `.deb` |
            | Windows | `.msi` installer |

          files: release/*
          fail_on_unmatched_files: false
