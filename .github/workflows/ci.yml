name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  # ── Unit tests (Linux only — logic is platform-neutral) ─────────────────────
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Fetch cloudflared sidecar (needed for build)
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  # ── Release builds ───────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            cf_dest: src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu
            cf_tarball: false
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*
              src-tauri/target/release/bundle/deb/*
            artifact_name: LocalRemoteShare-linux-x86_64

          - platform: macos-arm
            os: macos-14
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz
            cf_dest: src-tauri/binaries/cloudflared-aarch64-apple-darwin
            cf_tarball: true
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
            artifact_name: LocalRemoteShare-macos-arm64

          - platform: macos-intel
            os: macos-13
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.tgz
            cf_dest: src-tauri/binaries/cloudflared-x86_64-apple-darwin
            cf_tarball: true
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
            artifact_name: LocalRemoteShare-macos-x86_64

          - platform: windows
            os: windows-latest
            cf_url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
            cf_dest: src-tauri/binaries/cloudflared-x86_64-pc-windows-msvc.exe
            cf_tarball: false
            artifact_glob: src-tauri/target/release/bundle/msi/*.msi
            artifact_name: LocalRemoteShare-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Fetch cloudflared sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.cf_tarball }}" == "true" ]]; then
            curl -fsSL "${{ matrix.cf_url }}" | tar -xz -O cloudflared > "${{ matrix.cf_dest }}"
          else
            curl -fsSL "${{ matrix.cf_url }}" -o "${{ matrix.cf_dest }}"
          fi
          chmod +x "${{ matrix.cf_dest }}" || true   # chmod is a no-op on Windows

      - name: Build release bundle
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
